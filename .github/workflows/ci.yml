name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # This repository is a workspace index, not a package. It owns submodule
      # pointer hygiene and project-map accuracy; package build, test, and
      # release validation belongs to the nested repositories.
      - name: Verify workspace pointers and project map
        run: node scripts/verify-umbrella.mjs
